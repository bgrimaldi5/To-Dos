<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My To-Do's — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f0f4f9;
      --card:      #ffffff;
      --border:    #dde3ed;
      --accent:    #125370;
      --accent-h:  #0d3d52;
      --text:      #1a1f36;
      --muted:     #6b7694;
      --error-bg:  #fff0f0;
      --error:     #d0021b;
      --success-bg:#f0faf4;
      --success:   #1a7f4b;
      --radius:    7px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      background: var(--accent);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.75rem;
    }

    .logo-icon svg {
      width: 26px;
      height: 26px;
      fill: none;
      stroke: white;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 1.75rem;
      gap: 4px;
    }

    .tab {
      flex: 1;
      padding: 0.5rem;
      border: none;
      background: transparent;
      border-radius: 9px;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab.active {
      background: var(--card);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .field {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--card);
      transition: border-color 0.2s ease;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
    }

    .btn {
      width: 100%;
      padding: 0.75rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
      margin-top: 0.5rem;
    }

    .btn:hover  { background: var(--accent-h); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .message {
      display: none;
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .message.error   { display: block; background: var(--error-bg);   color: var(--error); }
    .message.success { display: block; background: var(--success-bg); color: var(--success); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
      </div>
      <h1>My To-Do's</h1>
      <p class="subtitle">Sign in to access your tasks</p>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
      <button class="tab"        id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div id="msg" class="message"></div>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>

    <button class="btn" id="submit-btn" onclick="handleSubmit()">Sign In</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    var SUPABASE_URL = 'https://ejyoxndpakldndmrwrkz.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqeW94bmRwYWtsZG5kbXJ3cmt6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NzYwNTIsImV4cCI6MjA5MTE1MjA1Mn0.EdSSFPokXOGgfQi0aOru7T03TAzbeuVCSNI_F9sQYhE';
    var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    var currentTab = 'signin';

    // If already logged in, go straight to app
    sb.auth.getSession().then(function(res) {
      if (res.data.session) window.location.href = 'app.html';
    });

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
      document.getElementById('submit-btn').textContent = tab === 'signin' ? 'Sign In' : 'Create Account';
      clearMsg();
    }

    function showMsg(text, type) {
      var el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'message ' + type;
    }

    function clearMsg() {
      var el = document.getElementById('msg');
      el.textContent = '';
      el.className = 'message';
    }

    function handleSubmit() {
      var email    = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var btn      = document.getElementById('submit-btn');

      if (!email || !password) { showMsg('Please enter your email and password.', 'error'); return; }
      if (password.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }

      btn.disabled = true;
      btn.textContent = 'Please wait...';
      clearMsg();

      if (currentTab === 'signin') {
        sb.auth.signInWithPassword({ email: email, password: password }).then(function(res) {
          btn.disabled = false;
          btn.textContent = 'Sign In';
          if (res.error) { showMsg(res.error.message, 'error'); return; }
          window.location.href = 'app.html';
        });
      } else {
        sb.auth.signUp({ email: email, password: password }).then(function(res) {
          btn.disabled = false;
          btn.textContent = 'Create Account';
          if (res.error) { showMsg(res.error.message, 'error'); return; }
          showMsg('Account created! You can now sign in.', 'success');
          switchTab('signin');
        });
      }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleSubmit();
    });
  </script>
</body>
</html>
